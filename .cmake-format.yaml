_help_format: Options affecting formatting.
format:
  line_width: 120
  max_pargs_hwrap: 4
_help_parse: Options affecting listfile parsing
parse:
  _help_additional_commands:
    - Specify structure for custom cmake functions
  additional_commands:
    CanopyGenerate:
      pargs:
        nargs: 6+
        flags:
          - SUPPRESS_CATCH_STUB_EXCEPTIONS
      spelling: CanopyGenerate
      kwargs:
        INSTALL_DIR: 1
        MOCK: 1
        DEPENDENCIES: +
        LINK_LIBRARIES: +
        INCLUDE_PATHS: +
        DEFINES: +
        ADDITIONAL_HEADERS: +

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Test Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 920px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }

        .status.disconnected {
            background: #ef4444;
        }

        .status.connected {
            background: #10b981;
        }

        .status.connecting {
            background: #f59e0b;
        }

        .content {
            padding: 30px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .controls input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .controls input:focus {
            outline: none;
            border-color: #667eea;
        }

        .controls input:disabled {
            background: #f3f4f6;
            cursor: not-allowed;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #059669;
        }

        .messages {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 4px;
            line-height: 1.5;
        }

        .message.sent {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
        }

        .message.received {
            background: #d1fae5;
            border-left: 4px solid #10b981;
        }

        .message.system {
            background: #f3f4f6;
            border-left: 4px solid #6b7280;
            color: #6b7280;
        }

        .message.error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }

        .timestamp {
            color: #9ca3af;
            font-size: 12px;
            margin-right: 8px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f9fafb;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .mode-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 6px;
            align-items: center;
        }

        .mode-selector label {
            font-weight: bold;
            margin-right: 10px;
        }

        .mode-selector input[type="radio"] {
            margin-right: 5px;
            cursor: pointer;
        }

        .mode-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .echo-result {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            color: #374151;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            min-height: 48px;
            overflow-wrap: anywhere;
            padding: 12px;
        }

        .calculator-panel {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .calculator-inputs {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .calculator-inputs input[type="number"] {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 16px;
        }

        .calculator-inputs input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .calculator-inputs select {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }

        .calculator-inputs select:focus {
            outline: none;
            border-color: #667eea;
        }

        .result-display {
            background: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calculator-shell {
            background: #111827;
            border-color: #111827;
            max-width: 390px;
            margin-left: auto;
            margin-right: auto;
            padding: 18px;
        }

        .calculator-display {
            background: #020617;
            border: 1px solid #374151;
            border-radius: 6px;
            margin-bottom: 14px;
            min-height: 96px;
            padding: 12px;
            text-align: right;
        }

        .calculator-expression {
            color: #9ca3af;
            font-size: 14px;
            min-height: 20px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .calculator-value {
            color: #f9fafb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 42px;
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
            min-height: 52px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .calculator-keys {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .calc-key {
            aspect-ratio: 1 / 1;
            background: #374151;
            border: 0;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 24px;
            font-weight: 700;
            min-width: 0;
            transition: background 0.15s, transform 0.15s;
        }

        .calc-key:hover:not(:disabled) {
            background: #4b5563;
        }

        .calc-key:active:not(:disabled) {
            transform: translateY(1px);
        }

        .calc-key:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        .calc-key.utility {
            background: #6b7280;
        }

        .calc-key.operator,
        .calc-key.equals {
            background: #2563eb;
        }

        .calc-key.operator:hover:not(:disabled),
        .calc-key.equals:hover:not(:disabled) {
            background: #1d4ed8;
        }

        .calc-key.zero {
            aspect-ratio: auto;
            grid-column: span 2;
        }

        .chat-panel {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .chat-history {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
        }

        .chat-message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .chat-message.user {
            background: #dbeafe;
            margin-left: auto;
            text-align: right;
        }

        .chat-message.assistant {
            background: #d1fae5;
            margin-right: auto;
        }

        .chat-message.assistant.streaming {
            border-left: 4px solid #10b981;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                border-color: #10b981;
            }

            50% {
                border-color: #34d399;
            }
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
        }

        .chat-input-container textarea {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 50px;
        }

        .chat-input-container textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .chat-input-container textarea:disabled {
            background: #f3f4f6;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 700px) {
            body {
                align-items: flex-start;
                padding: 10px;
            }

            .container {
                border-radius: 8px;
            }

            .header {
                padding: 20px;
            }

            .content {
                padding: 16px;
            }

            .controls,
            .chat-input-container {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .messages,
            .chat-history {
                height: 280px;
            }

            .calculator-shell {
                max-width: none;
                padding: 14px;
            }

            .calculator-value {
                font-size: 36px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Engineering Test Client</h1>
            <div class="status disconnected" id="status">Disconnected</div>
        </div>

        <div class="content">
            <!-- Mode Selector -->
            <div class="mode-selector">
                <label>Mode:</label>
                <div class="mode-option">
                    <input type="radio" name="mode" id="echoMode" value="echo" checked>
                    <label for="echoMode">Echo</label>
                </div>
                <div class="mode-option">
                    <input type="radio" name="mode" id="calculatorMode" value="calculator">
                    <label for="calculatorMode">Calculator</label>
                </div>
                <div class="mode-option">
                    <input type="radio" name="mode" id="chatMode" value="chat">
                    <label for="chatMode">Chat</label>
                </div>
                <div class="mode-option">
                    <input type="radio" name="mode" id="videoMode" value="video">
                    <label for="videoMode">Video</label>
                </div>
            </div>

            <!-- Echo Mode Controls -->
            <div id="echoPanel">
                <div class="controls">
                    <input type="text" id="messageInput" placeholder="HTTP echo payload">
                    <button class="btn btn-primary" id="sendBtn">Send</button>
                </div>
                <div class="echo-result" id="echoResult">No HTTP echo response yet</div>
            </div>

            <!-- Calculator Mode Controls -->
            <div id="calculatorPanel" class="calculator-panel hidden">
                <div class="calculator-shell">
                    <div class="calculator-display">
                        <div class="calculator-expression" id="calculatorExpression"></div>
                        <div class="calculator-value" id="calculatorValue">0</div>
                    </div>
                    <div class="calculator-keys" id="calculatorKeys">
                        <button class="calc-key utility" data-calc="clear">C</button>
                        <button class="calc-key utility" data-calc="sign">+/-</button>
                        <button class="calc-key utility" data-calc="backspace">⌫</button>
                        <button class="calc-key operator" data-calc-op="divide">÷</button>
                        <button class="calc-key" data-calc-digit="7">7</button>
                        <button class="calc-key" data-calc-digit="8">8</button>
                        <button class="calc-key" data-calc-digit="9">9</button>
                        <button class="calc-key operator" data-calc-op="multiply">×</button>
                        <button class="calc-key" data-calc-digit="4">4</button>
                        <button class="calc-key" data-calc-digit="5">5</button>
                        <button class="calc-key" data-calc-digit="6">6</button>
                        <button class="calc-key operator" data-calc-op="subtract">−</button>
                        <button class="calc-key" data-calc-digit="1">1</button>
                        <button class="calc-key" data-calc-digit="2">2</button>
                        <button class="calc-key" data-calc-digit="3">3</button>
                        <button class="calc-key operator" data-calc-op="add">+</button>
                        <button class="calc-key zero" data-calc-digit="0">0</button>
                        <button class="calc-key" data-calc="decimal">.</button>
                        <button class="calc-key equals" id="calculateBtn" data-calc="equals" disabled>=</button>
                    </div>
                </div>
            </div>

            <!-- Chat Mode Controls -->
            <div id="chatPanel" class="chat-panel hidden">
                <div class="chat-history" id="chatHistory"></div>
                <div class="chat-input-container">
                    <textarea id="chatInput" placeholder="Type your message..." disabled rows="2"></textarea>
                    <button class="btn btn-primary" id="sendChatBtn" disabled>Send</button>
                </div>
            </div>

            <!-- Video Mode Controls -->
            <div id="videoPanel" class="calculator-panel hidden">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px;">
                    <div>
                        <div style="font-weight:bold;margin-bottom:5px;">Local camera</div>
                        <video id="videoLocal" autoplay playsinline muted
                            style="width:100%;background:#000;border-radius:6px;"></video>
                    </div>
                    <div>
                        <div style="font-weight:bold;margin-bottom:5px;">From enclave</div>
                        <canvas id="videoRemote" width="640" height="480"
                            style="width:100%;background:#111;border-radius:6px;"></canvas>
                    </div>
                </div>
                <div style="display:flex;gap:10px;align-items:center;">
                    <button class="btn btn-success" id="videoStartBtn" disabled>Start camera</button>
                    <button class="btn btn-danger" id="videoStopBtn" disabled>Stop</button>
                    <label class="mode-option" style="margin-left:15px;">
                        <input type="checkbox" id="videoEffectGenie" disabled> Crown
                    </label>
                    <label class="mode-option">
                        <input type="checkbox" id="videoEffectInvert" disabled> Invert
                    </label>
                    <div id="videoStats" style="margin-left:auto;color:#6b7280;font-size:14px;">
                        sent 0 / received 0 / dropped 0
                    </div>
                </div>
                <div style="display:flex;gap:18px;align-items:center;margin-top:12px;flex-wrap:wrap;">
                    <label>Resolution
                        <select id="videoResolution" disabled>
                            <option value="160x120">160×120</option>
                            <option value="320x240" selected>320×240</option>
                            <option value="640x480">640×480</option>
                        </select>
                    </label>
                    <label>Brightness
                        <input type="range" id="videoBrightness" min="-128" max="127" value="0" disabled>
                        <span id="videoBrightnessVal">0</span>
                    </label>
                    <label>Quality
                        <input type="range" id="videoQuality" min="0" max="100" value="40" disabled>
                        <span id="videoQualityVal">40</span>
                    </label>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-success" id="connectBtn">Connect</button>
                <button class="btn btn-danger" id="disconnectBtn" disabled>Disconnect</button>
                <button class="btn btn-primary" id="clearBtn">Clear Messages</button>
            </div>

            <div class="messages" id="messages"></div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="sentCount">0</div>
                    <div class="stat-label">Messages Sent</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="receivedCount">0</div>
                    <div class="stat-label">Messages Received</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="uptime">0s</div>
                    <div class="stat-label">Connection Time</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Protobuf.js minimal runtime and generated protocol definitions -->
    <script src="https://cdn.jsdelivr.net/npm/long@5.2.3/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.5/dist/protobuf.min.js"></script>
    <script>
        // Create a module shim for the generated protobuf code
        // The generated code expects require('protobufjs/minimal') but we have global protobuf
        (function (global) {
            // Temporarily create module object for UMD detection
            var tempModule = { exports: {} };
            var tempRequire = function (name) {
                if (name === 'protobufjs/minimal' || name === 'protobufjs') {
                    return protobuf; // Return the globally loaded protobuf
                }
                throw new Error('Module not found: ' + name);
            };

            // Store original values
            var originalModule = global.module;
            var originalRequire = global.require;

            // Set up temporary module system
            global.module = tempModule;
            global.require = tempRequire;

            // Load will happen next, then we'll restore and extract
            global.__loadProtoNext = function () {
                // Restore original values
                global.module = originalModule;
                global.require = originalRequire;

                // Export the loaded module
                global.$protobuf_websocket = tempModule.exports;
                delete global.__loadProtoNext;
            };
        })(this);
    </script>
    <script src="generated/websocket_demo_proto.js"></script>
    <script>__loadProtoNext();</script>
    <!-- Canopy generic transport and generated IDL proxy/stub -->
    <script src="generated/untrusted_web_transport.js"></script>
    <script src="generated/websocket_demo.js"></script>
    <script src="generated/websocket_demo_config.js"></script>
    <script src="client.js"></script>
</body>

</html>

<svg xmlns="http://www.w3.org/2000/svg" width="640" height="285" viewBox="0 0 640 285" role="img" aria-labelledby="title">
<title id="title">One-way post call sequence</title>
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
    <path class="arrow-head" d="M 0 0 L 10 4 L 0 8 z" />
  </marker>
  <style>
  .bg { fill: #ffffff; }
  .box { fill: #f6f8fa; stroke: #57606a; stroke-width: 1.6; rx: 8; }
  .group { fill: none; stroke: #57606a; stroke-width: 1.8; rx: 10; }
  .label { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: middle; }
  .small { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
  .title { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
  .arrow { stroke: #0969da; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  .arrow-head { fill: #0969da; }
  .dashed { stroke-dasharray: 6 5; }
  .lifeline { stroke: #8c959f; stroke-width: 1.5; stroke-dasharray: 5 5; }
  .note { fill: #fff8c5; stroke: #9a6700; stroke-width: 1.3; rx: 6; }
  @media (prefers-color-scheme: dark) {
    .bg { fill: #0d1117; }
    .box, .participant, .event { fill: #161b22; stroke: #8b949e; }
    .group { stroke: #8b949e; }
    .label, .small, .title { fill: #f0f6fc; }
    .arrow { stroke: #58a6ff; }
    .event-arrow, .lifeline { stroke: #8b949e; }
    .note { fill: #2d2a13; stroke: #d29922; }
    .arrow-head { fill: #58a6ff; }
  }
</style>
</defs>
<rect class="bg" x="0" y="0" width="640" height="285" />
<text class="title" x="170" y="34">caller</text>
<text class="title" x="470" y="34">callee</text>
<line class="lifeline" x1="170" y1="60" x2="170" y2="245" />
<line class="lifeline" x1="470" y1="60" x2="470" y2="245" />
<path class="arrow" d="M 170 100 L 460 100" />
<text class="small" x="320" y="84">[post]</text>
<path class="arrow" d="M 170 145 h 70 v 34 h -70" />
<text class="small" x="270" y="162">continues immediately</text>
<rect class="note" x="210" y="205" width="220" height="42" />
<text class="small" x="320" y="226">no reply needed</text>
</svg>

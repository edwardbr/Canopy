<svg xmlns="http://www.w3.org/2000/svg" width="680" height="290" viewBox="0 0 680 290" role="img" aria-labelledby="title">
<title id="title">Zone routing tree</title>
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
    <path class="arrow-head" d="M 0 0 L 10 4 L 0 8 z" />
  </marker>
  <style>
  .bg { fill: #ffffff; }
  .box { fill: #f6f8fa; stroke: #57606a; stroke-width: 1.6; rx: 8; }
  .group { fill: none; stroke: #57606a; stroke-width: 1.8; rx: 10; }
  .label { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: middle; }
  .small { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
  .title { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
  .arrow { stroke: #0969da; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  .arrow-head { fill: #0969da; }
  .dashed { stroke-dasharray: 6 5; }
  .lifeline { stroke: #8c959f; stroke-width: 1.5; stroke-dasharray: 5 5; }
  .note { fill: #fff8c5; stroke: #9a6700; stroke-width: 1.3; rx: 6; }
  @media (prefers-color-scheme: dark) {
    .bg { fill: #0d1117; }
    .box, .participant, .event { fill: #161b22; stroke: #8b949e; }
    .group { stroke: #8b949e; }
    .label, .small, .title { fill: #f0f6fc; }
    .arrow { stroke: #58a6ff; }
    .event-arrow, .lifeline { stroke: #8b949e; }
    .note { fill: #2d2a13; stroke: #d29922; }
    .arrow-head { fill: #58a6ff; }
  }
</style>
</defs>
<rect class="bg" x="0" y="0" width="680" height="290" />
<rect class="box" x="260" y="25" width="120" height="44" />
<text class="label" x="320.0" y="47.0">root zone</text>
<rect class="box" x="70" y="110" width="110" height="44" />
<text class="label" x="125.0" y="132.0">zone A</text>
<rect class="box" x="265" y="110" width="110" height="44" />
<text class="label" x="320.0" y="132.0">zone B</text>
<rect class="box" x="460" y="110" width="110" height="44" />
<text class="label" x="515.0" y="132.0">zone C</text>
<rect class="box" x="70" y="210" width="110" height="44" />
<text class="label" x="125.0" y="232.0">zone D</text>
<rect class="box" x="405" y="210" width="110" height="44" />
<text class="label" x="460.0" y="232.0">zone D</text>
<rect class="box" x="535" y="210" width="90" height="44" />
<text class="label" x="580.0" y="232.0">zone E</text>
<path class="arrow" d="M 260 47 L 180 132" />
<path class="arrow" d="M 320 69 L 320 110" />
<path class="arrow" d="M 380 47 L 460 132" />
<path class="arrow" d="M 125 154 L 125 210" />
<path class="arrow" d="M 515 154 L 460 210" />
<path class="arrow" d="M 515 154 L 580 210" />
</svg>
